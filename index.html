<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFP Organizadores</title>
  <link rel="manifest" href="manifest.json">
</head>

<body style="margin:0; font-family:sans-serif; background:#0a0a0a; color:white;">

  <div id="loaderScreen" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0a0a0a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:18px;
">
    Cargando...
  </div>

  <div id="header"
    style="display:none; padding:15px; border-bottom:1px solid #222; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">AFP</h2>
    <span id="usernameDisplay" style="font-size:14px;"></span>
  </div>

  <div id="contenido" style="display:none; padding:20px; text-align:center; padding-bottom:80px;">
    <p>Cargando...</p>
  </div>

  <div id="menu" style="
  position:fixed;
  bottom:0;
  width:100%;
  display:none;
  justify-content:space-around;
  background:#111;
  padding:10px 0;
  border-top:1px solid #222;
">
    <div onclick="cambiarPantalla('inicio')">Inicio</div>
    <div onclick="cambiarPantalla('eventos')">Eventos</div>
    <div onclick="cambiarPantalla('organizadores')">Organizadores</div>
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, getDocs, getDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCueKXS0FR-MRDDqcJCanVBl_U4w11FJmg",
      authDomain: "afp-app-3fdf1.firebaseapp.com",
      projectId: "afp-app-3fdf1",
      storageBucket: "afp-app-3fdf1.firebasestorage.app",
      messagingSenderId: "274409312091",
      appId: "1:274409312091:web:ea848342cbe7b41a7c947e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const contenido = document.getElementById("contenido");
    const menu = document.getElementById("menu");
    const header = document.getElementById("header");
    const loader = document.getElementById("loaderScreen");
    let usuarioActual = null;

    window.mostrarLogin = mostrarLogin;
    window.mostrarRegistro = mostrarRegistro;
    window.registrar = registrar;
    window.login = login;
    window.cambiarPantalla = cambiarPantalla;
    window.pantallaCrearEvento = () => pantallaCrearEvento();
    window.crearEvento = crearEvento;
    window.verEvento = verEvento;

    onAuthStateChanged(auth, async (user) => {

      if (user) {
        try {
          const docSnap = await getDoc(doc(db, "usuarios", user.uid));

          if (docSnap.exists()) {
            usuarioActual = docSnap.data();
            document.getElementById("usernameDisplay").innerText = usuarioActual.username;
          }

          cambiarPantalla("inicio");
          menu.style.display = "flex";

        } catch (error) {
          console.error("Error usuario:", error);
          contenido.innerHTML = "<p>Error cargando usuario</p>";
        }

      } else {

        contenido.innerHTML = `
      <h2>Bienvenido</h2>
      <button onclick="mostrarLogin()" style="width:100%; padding:12px;">Iniciar Sesión</button>
      <button onclick="mostrarRegistro()" style="width:100%; padding:12px;">Registrarse</button>
    `;

        menu.style.display = "none";
      }

      // 🔥 SIEMPRE SE EJECUTA
      loader.style.display = "none";
      header.style.display = "flex";
      contenido.style.display = "block";

    });

    function cambiarPantalla(p) {

      if (p === "inicio") {
        cargarEventos();
        return;
      }

      if (p === "eventos") {
        contenido.innerHTML = "Eventos";
        return;
      }

      if (p === "organizadores") {
        contenido.innerHTML = "Organizadores";
        return;
      }

    }

    async function cargarEventos() {

      const querySnapshot = await getDocs(collection(db, "eventos"));

      let eventos = [];

      querySnapshot.forEach(doc => {
        eventos.push(doc.data());
      });

      eventos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));

      let html = "<h2>Eventos</h2>";

      eventos.forEach(e => {
        html += `
      <div onclick='verEvento(${JSON.stringify(e)})' style="
        background:#1a1a1a;
        padding:15px;
        margin-bottom:10px;
        border-radius:10px;
        text-align:left;
        cursor:pointer;
      ">
        <strong>${e.ubicacion}</strong><br>
        ${e.fecha} — ${e.horario}<br>
        ${e.modalidad} | ${e.inscripcion} ${e.tipo}
      </div>
    `;
      });

      if (usuarioActual && usuarioActual.rol === "organizador") {
        html += `<button onclick="pantallaCrearEvento()" style="width:100%; padding:12px; margin-top:15px;">Crear Evento</button>`;
      }

      contenido.innerHTML = html;
    }

    function verEvento(e) {

      let html = "";

      html += "<h2>" + e.ubicacion + "</h2>";
      html += "<p><strong>Fecha:</strong> " + e.fecha + "</p>";
      html += "<p><strong>Horario:</strong> " + e.horario + "</p>";
      html += "<p><strong>Modalidad:</strong> " + e.modalidad + "</p>";
      html += "<p><strong>Inscripción:</strong> " + e.inscripcion + " " + e.tipo + "</p>";

      html += "<button onclick=\"cambiarPantalla('inicio')\" style='width:100%; padding:10px; margin-top:20px;'>Volver</button>";

      contenido.innerHTML = html;
    }

    function pantallaCrearEvento() {

      let html = "";

      html += "<h2>Crear Evento</h2>";

      html += "<label>Fecha</label>";
      html += "<input type='date' id='fecha' style='width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;'>";

      html += "<label>Ubicación</label>";
      html += "<select id='ubicacion' style='width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;'>";

      html += "<option>Plaza San Miguel</option>";
      html += "<option>Hipodromo</option>";

      html += "</select>";

      html += "<button onclick='crearEvento()' style='width:100%; padding:12px;'>Crear</button>";
      html += "<button onclick=\"cambiarPantalla('inicio')\" style='width:100%; padding:10px; margin-top:10px;'>Volver</button>";

      contenido.innerHTML = html;
    }

    async function crearEvento() {

      const ubicacion = document.getElementById("ubicacion").value;
      const fecha = document.getElementById("fecha").value;

      if (!fecha) {
        alert("Seleccioná una fecha");
        return;
      }

      try {

        await addDoc(collection(db, "eventos"), {
          ubicacion,
          fecha,
          horario: "Sin definir",
          modalidad: "Sin definir",
          inscripcion: "0",
          tipo: "-"
        });

        cambiarPantalla("inicio");

      } catch (error) {
        console.error(error);
        alert("Error al crear evento");
      }
    }

  </script>

</body>

</html>
