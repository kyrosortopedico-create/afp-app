<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AFP Organizadores</title>
  <link rel="manifest" href="manifest.json">
</head>

<body style="margin:0; font-family:sans-serif; background:#0a0a0a; color:white;">
  <style>
    #contenido {
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    .eventoCardAnim {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      animation: aparecerCard 0.4s ease forwards;
    }

    @keyframes aparecerCard {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>

  <div id="loaderScreen" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0a0a0a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:18px;
">
    Cargando...
  </div>

  <!-- HEADER -->
  <div id="header"
    style="display:none; padding:15px; border-bottom:1px solid #222; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">AFP</h2>
    <span id="usernameDisplay" style="font-size:14px;"></span>
  </div>

  <!-- CONTENIDO -->
  <div id="contenido" style="display:none; padding:20px; text-align:center;">
    <p>Cargando...</p>
  </div>

  <!-- MENÚ -->
  <div id="menu" style="
    position:fixed;
    bottom:0;
    width:100%;
    display:none;
    justify-content:space-around;
    background:#111;
    padding:10px 0;
    border-top:1px solid #222;
  ">
    <div onclick="cambiarPantalla('inicio')">Inicio</div>
    <div onclick="cambiarPantalla('eventos')">Eventos</div>
    <div onclick="cambiarPantalla('organizadores')">Organizadores</div>
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, getDocs, getDoc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCueKXS0FR-MRDDqcJCanVBl_U4w11FJmg",
      authDomain: "afp-app-3fdf1.firebaseapp.com",
      projectId: "afp-app-3fdf1",
      storageBucket: "afp-app-3fdf1.firebasestorage.app",
      messagingSenderId: "274409312091",
      appId: "1:274409312091:web:ea848342cbe7b41a7c947e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const contenido = document.getElementById("contenido");
    let eventos = [];
    const menu = document.getElementById("menu");
    const header = document.getElementById("header");
    const loader = document.getElementById("loaderScreen");
    let usuarioActual = null;
    let deferredPrompt = null;

    window.mostrarLogin = mostrarLogin;
    window.mostrarRegistro = mostrarRegistro;
    window.registrar = registrar;
    window.login = login;
    window.cambiarPantalla = cambiarPantalla;
    window.pantallaCrearEvento = function () {
      pantallaCrearEvento();
    };
    window.crearEvento = crearEvento;
    window.verEvento = verEvento;
    window.volverInicio = volverInicio;

    onAuthStateChanged(auth, async (user) => {

      try {

        if (user) {

          const docRef = doc(db, "usuarios", user.uid);
          const docSnap = await getDoc(docRef);

          if (docSnap.exists()) {
            const data = docSnap.data();
            usuarioActual = data;
            document.getElementById("usernameDisplay").innerText = data.username;
          }

          cambiarPantalla("inicio");
          menu.style.display = "flex";

        } else {

          contenido.innerHTML = `
            <h2>Bienvenido</h2>

            <button onclick="mostrarLogin()" style="width:100%; padding:12px; margin-bottom:10px;">
              Iniciar Sesión
            </button>

            <button onclick="mostrarRegistro()" style="width:100%; padding:12px;">
              Registrarse
            </button>
          `;

          menu.style.display = "none";
        }

      } catch (error) {
        console.error("Error de sesión:", error);
        contenido.innerHTML = "<p>Error cargando la app</p>";
      }

      // 🔥 ESTO SIEMPRE SE EJECUTA
      loader.style.display = "none";
      header.style.display = "flex";
      contenido.style.display = "block";

    });

    function mostrarLogin() {
      contenido.innerHTML = `
        <h3>Iniciar Sesión</h3>
        <input id="loginEmail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="loginPassword" type="password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <button onclick="login()" style="width:100%; padding:10px;">Entrar</button>
      `;
    }

    function mostrarRegistro() {
      contenido.innerHTML = `
        <h3>Registrarse</h3>
        <input id="registerUsername" placeholder="Nombre de usuario" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="registerEmail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="registerPassword" type="password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="registerPassword2" type="password" placeholder="Repetir contraseña" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <button onclick="registrar()" style="width:100%; padding:10px;">Crear cuenta</button>
        <p id="mensajeRegistro"></p>
      `;
    }

    async function registrar() {
      const username = document.getElementById("registerUsername").value;
      const email = document.getElementById("registerEmail").value;
      const pass = document.getElementById("registerPassword").value;
      const pass2 = document.getElementById("registerPassword2").value;
      const mensaje = document.getElementById("mensajeRegistro");

      mensaje.innerText = "Creando cuenta...";
      mensaje.style.color = "yellow";

      if (pass !== pass2) {
        mensaje.innerText = "Las contraseñas no coinciden";
        mensaje.style.color = "red";
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, "usuarios"));
        let existe = false;

        snapshot.forEach(d => {
          if (d.data().username === username) existe = true;
        });

        if (existe) {
          mensaje.innerText = "Nombre de usuario ya usado";
          mensaje.style.color = "red";
          return;
        }

        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);

        await setDoc(doc(db, "usuarios", userCredential.user.uid), {
          username,
          email,
          rol: "publico"
        });

        await auth.signOut();

        let t = 5;
        mensaje.style.color = "lightgreen";

        const i = setInterval(() => {
          mensaje.innerText = `Cuenta creada con éxito, espere (${t})`;
          t--;
          if (t < 0) {
            clearInterval(i);
            mostrarLogin();
          }
        }, 1000);

      } catch (error) {
        mensaje.innerText = error.code === "auth/email-already-in-use"
          ? "Correo ya usado"
          : error.message;
        mensaje.style.color = "red";
      }
    }

    async function login() {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        setTimeout(() => cambiarPantalla("inicio"), 500);
      } catch (error) {
        alert(error.message);
      }
    }

    function cambiarPantalla(p) {

      if (p === "inicio") {
        cargarEventos();
        return;
      }

      if (p === "eventos") {
        contenido.innerHTML = "Eventos";
        return;
      }

      if (p === "organizadores") {
        contenido.innerHTML = "Organizadores";
        return;
      }

      let html = `
        <h2>Eventos</h2>
        <p>Lista de eventos próximamente</p>
      `;

      if (usuarioActual && usuarioActual.rol === "organizador") {
        html += `
          <button onclick="pantallaCrearEvento()" style="width:100%; padding:12px; margin-top:15px;">
            Crear Evento
          </button>
        `;
      }

      cambiarContenidoConAnimacion(html, "adelante");
    }

    function cambiarContenidoConAnimacion(nuevoHTML, direccion = "adelante") {

      // posición inicial (salida)
      contenido.style.transition = "transform 0.25s ease, opacity 0.2s ease";

      if (direccion === "adelante") {
        contenido.style.transform = "translateX(-30px)";
      } else {
        contenido.style.transform = "translateX(30px)";
      }

      contenido.style.opacity = "0";

      setTimeout(() => {

        // cambiar contenido
        contenido.innerHTML = nuevoHTML;

        // posición de entrada (desde el lado opuesto)
        contenido.style.transition = "none";

        if (direccion === "adelante") {
          contenido.style.transform = "translateX(30px)";
        } else {
          contenido.style.transform = "translateX(-30px)";
        }

        contenido.style.opacity = "0";

        // activar animación
        requestAnimationFrame(() => {
          contenido.style.transition = "transform 0.25s ease, opacity 0.2s ease";
          contenido.style.transform = "translateX(0)";
          contenido.style.opacity = "1";
        });

      }, 180);
    }

    async function cargarEventos() {

      const querySnapshot = await getDocs(collection(db, "eventos"));



      eventos = [];

      querySnapshot.forEach(docSnap => {
        eventos.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      eventos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
      eventos = eventos.filter(e => esEventoActivo(e.fecha));

      let html = "<h2>Eventos</h2>";

      if (eventos.length === 0) {
        html += "<p>No hay eventos todavía</p>";
      }
      eventos.forEach((e, i) => {

        html += `
    <div data-id="${e.id}" class="eventoCard eventoCardAnim" style="
      animation-delay:${i * 0.05}s;
      position:relative;
      overflow:hidden;
      border-radius:16px;
      margin-bottom:14px;
      cursor:pointer;
      background:#0f0f0f;
      box-shadow:0 6px 20px rgba(0,0,0,0.6);
    ">

      <div style="
        position:absolute;
        left:0;
        top:0;
        bottom:0;
        width:6px;
        background:${e.color};
      "></div>

      <div style="padding:12px 14px 12px 12px;">

        <!-- COMPETENCIA (AHORA PROTAGONISTA) -->
        <div style="
          font-size:18px;
          font-weight:900;
          color:${e.color};
          margin-bottom:8px;
          text-align:left;
          letter-spacing:0.5px;
        ">
          ${e.competencia}
        </div>

        <!-- BLOQUE PRINCIPAL -->
        <div style="
          display:flex;
          justify-content:space-between;
          align-items:flex-start;
        ">

          <!-- IZQUIERDA -->
          <div style="text-align:left;">

            <div style="
              font-size:17px;
              font-weight:700;
              margin-bottom:4px;
              color:#fff;
            ">
              ${e.ubicacion}
            </div>

            <div style="
              font-size:14px;
              color:#bbb;
              font-weight:500;
            ">
              ${formatearHora(e.horario)} HS • $${e.inscripcion}
            </div>

          </div>

          <!-- DERECHA (MAS PROTAGONISMO) -->
          <div style="
  position:relative;
  text-align:right;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
">

  ${obtenerEstadoEvento(e.fecha)
            ? `<div style="
          position:absolute;
          top:-24px;
          right:0;
          background:${obtenerEstadoEvento(e.fecha) === "HOY" ? "#1eff8a" : "#ffd400"};
          color:#000;
          font-size:10px;
          font-weight:900;
          padding:2px 6px;
          border-radius:6px;
        ">
          ${obtenerEstadoEvento(e.fecha)}
        </div>`
            : ""
          }

  <div style="
    font-size:18px;
    font-weight:800;
    color:#fff;
    line-height:1.1;
  ">
    ${e.modalidad.toUpperCase()}<br>
    <span style="font-size:14px; color:#aaa;">
      ${formatearFecha(e.fecha)}
    </span>
  </div>

</div>

        </div>

      </div>

    </div>
  `;
      });

      if (usuarioActual && usuarioActual.rol === "organizador") {
        html += `
          <button onclick="pantallaCrearEvento()" style="width:100%; padding:12px; margin-top:15px;">
            Crear Evento
          </button>
        `;
      }

      contenido.innerHTML = html;
    }

      let html = "";

      html += "<h2>Crear Evento</h2>";
      html += "<label>Ubicación</label>";
      html += "<select id='ubicacion' style='width:100%; padding:10px; margin-bottom:10px;'>";
      html += "<option>Plaza San Miguel</option>";
      html += "<option>Hipodromo</option>";
      html += "<option>Anfiteatro</option>";
      html += "<option>SkatePark</option>";
      html += "<option>Plaza Alberdi</option>";
      html += "<option>Plaza Carbó</option>";
      html += "<option>Plaza Cerrada</option>";
      html += "<option>Plaza San Agustín</option>";
      html += "<option>Plaza Sáenz Peña</option>";
      html += "<option>Plaza 1ro de Mayo</option>";
      html += "<option>Parque Lineal Sur</option>";
      html += "<option>Gazzano</option>";
      html += "<option>Polideportivo AATRA</option>";
      html += "</select>";

      html += "<select id='horario' style='width:100%; padding:10px; margin-bottom:10px;'>";
      html += "<option>16:00 - 17:00</option>";
      html += "<option>17:00 - 18:00</option>";
      html += "<option>18:00 - 19:00</option>";

      html += "</select>";

      html += "<div style='display:flex; gap:10px; margin-bottom:10px;'>";

      html += "</div>";

      html += "<button onclick='crearEvento()' style='width:100%; padding:12px; margin-top:10px;'>Crear</button>";
      html += "<button onclick=\"volverInicio()\" style='width:100%; padding:10px; margin-top:10px; background:#222;'>Volver</button>";

      cambiarContenidoConAnimacion(html, "adelante");

    function verEvento(e) {

      let html = "";

      html += `
    <div style="
  position:relative;
  background:linear-gradient(180deg, #1a1a1a, #0f0f0f);
  padding:20px;
  border-radius:16px;
  text-align:left;
  box-shadow:0 6px 20px rgba(0,0,0,0.5);
">
  `;

      html += `
    <div style="font-size:22px; font-weight:bold; margin-bottom:10px;">
      ${e.ubicacion}
    </div>
  `;

      html += `
    <div style="font-size:14px; color:#aaa; margin-bottom:5px;">
      📅 ${e.fecha}
    </div>
  `;

      html += `
    <div style="font-size:14px; color:#aaa; margin-bottom:10px;">
      ⏰ ${e.horario}
    </div>
  `;

      html += `
    <div style="margin-bottom:15px;">
      <span style="
        background:#222;
        padding:6px 10px;
        border-radius:8px;
        font-size:13px;
        margin-right:6px;
      ">
        ${e.modalidad}
      </span>

      <span style="
        background:#222;
        padding:6px 10px;
        border-radius:8px;
        font-size:13px;
      ">
        ${e.inscripcion} ${e.tipo}
      </span>
    </div>
  `;

      if (usuarioActual && auth.currentUser.uid === e.creadorId) {

        html += `
    <button onclick="event.stopPropagation(); eliminarEvento('${e.id}')" style="
  position:absolute;
  top:12px;
  right:12px;
  background:rgba(255,59,59,0.15);
  border:1px solid rgba(255,59,59,0.5);
  border-radius:10px;
  padding:8px 10px;
  color:#ff3b3b;
  font-size:14px;
  cursor:pointer;
  backdrop-filter: blur(6px);
">
  🗑
</button>
  `;
      }

      html += `
    <button onclick="volverInicio()" style="
      width:100%;
      padding:12px;
      background:#fff;
      color:#000;
      border:none;
      border-radius:10px;
      font-weight:bold;
      margin-top:10px;
    ">
      Volver
    </button>
  `;

      html += `</div>`;

      cambiarContenidoConAnimacion(html, "adelante");
    }

    async function crearEvento() {

      const ubicacion = document.getElementById("ubicacion").value;
      const horario = document.getElementById("horario").value;
      const fecha = document.getElementById("fecha").value;
      const modalidad = document.getElementById("modalidad").value;
      const inscripcion = document.getElementById("inscripcion").value;
      const tipo = document.getElementById("tipo").value;

      // 🔥 VALIDACIÓN REAL
      if (!fecha || !ubicacion || !horario || !modalidad || !inscripcion || !tipo) {

        let error = document.getElementById("errorEvento");

        if (!error) {
          error = document.createElement("p");
          error.id = "errorEvento";
          error.style.color = "red";
          error.style.marginTop = "10px";
          contenido.appendChild(error);
        }

        error.innerText = "Debes completar todos los campos.";
        return;
      }

      const competencia = usuarioActual.competencia;

      if (!competencia) {
        alert("Error: usuario sin competencia asignada");
        return;
      }

      let color = "#ffffff";

      if (competencia === "Liga Litoral") color = "#FF4C00";
      if (competencia === "Rappandemia") color = "#440069";
      if (competencia === "Homies") color = "#0DBFA1";
      if (competencia === "La Casa del Free") color = "#FFF200";
      if (competencia === "Wasted") color = "#212121";
      if (competencia === "RP") color = "#1064AD";

      const misEventos = eventos.filter(e => e.creadorId === auth.currentUser.uid);

      if (misEventos.length >= 2) {
        alert("Solo podés tener 2 eventos activos");
        return;
      }

      try {
        await addDoc(collection(db, "eventos"), {
          ubicacion,
          horario,
          fecha,
          modalidad,
          inscripcion,
          tipo,
          competencia,
          color,
          creado: Date.now(),
          creadorId: auth.currentUser.uid
        });

        alert("Evento creado correctamente");

        // 🔥 recarga REAL
        await cargarEventos();

        cambiarPantalla("inicio");

      } catch (error) {
        alert("Error al crear evento");
        console.error(error);
      }
    }

    function volverInicio() {

      contenido.style.transition = "transform 0.25s ease, opacity 0.2s ease";
      contenido.style.transform = "translateX(30px)";
      contenido.style.opacity = "0";

      setTimeout(() => {

        // ⚡ mostramos placeholder inmediato
        contenido.innerHTML = "<p style='opacity:0.6'>Cargando eventos...</p>";

        contenido.style.transition = "none";
        contenido.style.transform = "translateX(-30px)";
        contenido.style.opacity = "0";

        requestAnimationFrame(() => {
          contenido.style.transition = "transform 0.25s ease, opacity 0.2s ease";
          contenido.style.transform = "translateX(0)";
          contenido.style.opacity = "1";
        });

        // 🔥 recién acá cargamos datos reales
        cargarEventos();

      }, 180);
    }

    function formatearFecha(fecha) {

      if (!fecha) return "";

      const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];

      const [year, month, day] = fecha.split("-");

      return parseInt(day) + " " + meses[parseInt(month) - 1];
    }

    function formatearHora(rango) {
      return rango.split(" - ")[0];
    }

    function obtenerEstadoEvento(fecha) {

      if (!fecha) return null;

      const [y, m, d] = fecha.split("-");

      const hoy = new Date();
      const evento = new Date(y, m - 1, d); // 🔥 LOCAL (NO UTC)

      hoy.setHours(0, 0, 0, 0);
      evento.setHours(0, 0, 0, 0);

      const diff = (evento - hoy) / (1000 * 60 * 60 * 24);

      if (diff === 0) return "HOY";
      if (diff === 1) return "MAÑANA";

      return null;
    }

    function esEventoActivo(fecha) {

      if (!fecha) return false;

      const [y, m, d] = fecha.split("-");

      const hoy = new Date();
      const evento = new Date(y, m - 1, d); // 🔥 LOCAL

      hoy.setHours(0, 0, 0, 0);
      evento.setHours(0, 0, 0, 0);

      return evento >= hoy;
    }

    function clickEvento(el, evento) {

      el.style.background = "#ffffff";
      el.style.color = "#000000";

      el.querySelectorAll("*").forEach(n => {
        n.style.color = "#000";
      });

      setTimeout(() => {
        verEvento(evento);
      }, 120);
    }

    function verEventoPorId(id) {

      const evento = eventos.find(e => e.id === id);

      if (!evento) {
        console.log("Evento no encontrado:", id);
        return;
      }

      verEvento(evento);
    }

    document.addEventListener("click", function (e) {

      const card = e.target.closest(".eventoCard");

      if (!card) return;

      const id = card.getAttribute("data-id");

      const evento = eventos.find(ev => ev.id === id);

      if (!evento) {
        console.log("Evento no encontrado:", id);
        return;
      }

      clickEvento(card, evento);
    });

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;

      setTimeout(() => {
        mostrarBannerInstalar();
      }, 2000);
    });

    function mostrarBannerInstalar() {

      // no mostrar si ya está instalada
      if (window.matchMedia('(display-mode: standalone)').matches) return;

      // evitar duplicado
      if (document.getElementById("installBanner")) return;

      const banner = document.createElement("div");
      banner.id = "installBanner";

      banner.style = `
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#111;
  border:1px solid #222;
  padding:12px 16px;
  border-radius:14px;
  display:flex;
  align-items:center;
  gap:10px;
  z-index:9999;
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
  opacity:0;
  transition: all 0.6s ease;
`;

      banner.innerHTML = `
    <span style="font-size:13px; color:#fff;">
      Instalar AFP
    </span>

    <button id="btnInstalar" style="
      padding:6px 12px;
      border:none;
      border-radius:8px;
      background:#fff;
      color:#000;
      font-weight:bold;
    ">
      Instalar
    </button>
  `;

      document.body.appendChild(banner);
      setTimeout(() => {
        banner.style.opacity = "1";
        banner.style.transform = "translateX(-50%) translateY(0)";
      }, 50);

      document.getElementById("btnInstalar").onclick = async () => {

        if (!deferredPrompt) return;

        deferredPrompt.prompt();
        await deferredPrompt.userChoice;

        deferredPrompt = null;
        banner.remove();
      };
    }

    async function eliminarEvento(id) {

      const confirmar = confirm("¿Eliminar este evento?");

      if (!confirmar) return;

      try {

        await deleteDoc(doc(db, "eventos", id));

        await cargarEventos();
        cambiarPantalla("inicio");

      } catch (error) {
        alert("Error al eliminar");
        console.error(error);
      }
    }

  </script>
