<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
</head>

<body style="margin:0; font-family:sans-serif; background:#0a0a0a; color:white;">
  <style>
    #listaParticipantes::-webkit-scrollbar {
      width: 6px;
    }

    #listaParticipantes::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    #listaParticipantes::-webkit-scrollbar-track {
      background: transparent;
    }

    #contenido {
      opacity: 1;
      transition: opacity 0.2s ease;
    }

    * {
      -webkit-tap-highlight-color: transparent;
    }

    .eventoCardAnim {
      opacity: 0;
      transform: translateY(20px) scale(0.98);
      animation: aparecerCard 0.4s ease forwards;
    }

    @keyframes aparecerCard {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>

  <div id="loaderScreen" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0a0a0a;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  font-size:18px;
">
    Cargando...
  </div>

  <!-- HEADER -->
  <div id="header"
    style="display:none; padding:15px; border-bottom:1px solid #222; justify-content:space-between; align-items:center;">
    <h2 style="margin:0;">AFP</h2>
    <span id="usernameDisplay" style="font-size:14px;"></span>
  </div>

  <!-- CONTENIDO -->
  <div id="contenido" style="display:none; padding:20px; text-align:center;">
    <p>Cargando...</p>
  </div>

  <!-- MENÚ -->
  <div id="menu" style="
    position:fixed;
    bottom:0;
    width:100%;
    display:none;
    justify-content:space-around;
    background:#111;
    padding:10px 0;
    border-top:1px solid #222;
  ">
    <div onclick="cambiarPantalla('inicio')">Inicio</div>
    <div onclick="cambiarPantalla('eventos')">Eventos</div>
    <div id="btnOrganizadores" onclick="cambiarPantalla('organizadores')" style="display:none;">
      Organizadores
    </div>
  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, collection, getDocs, getDoc, addDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getMessaging, getToken, onMessage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCueKXS0FR-MRDDqcJCanVBl_U4w11FJmg",
      authDomain: "afp-app-3fdf1.firebaseapp.com",
      projectId: "afp-app-3fdf1",
      storageBucket: "afp-app-3fdf1.firebasestorage.app",
      messagingSenderId: "274409312091",
      appId: "1:274409312091:web:ea848342cbe7b41a7c947e"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const messaging = getMessaging(app);

    const contenido = document.getElementById("contenido");
    let eventos = [];
    const menu = document.getElementById("menu");
    const header = document.getElementById("header");
    const loader = document.getElementById("loaderScreen");
    let usuarioActual = null;
    let deferredPrompt = null;
    let listaParticipantes = [];
    let tieneCabezasGlobal = false;

    let eventoPlanillaActual = null;
    let rondaActual = [];
    let ganadoresSeleccionados = {};
    let ganadoresPorBatalla = 1;
    let esClasificatoria = false;

    window.pantallaPlanillas = pantallaPlanillas;
    window.seleccionarEventoPlanilla = seleccionarEventoPlanilla;
    window.planillaConCabezas = planillaConCabezas;
    window.agregarParticipante = agregarParticipante;
    window.eliminarParticipante = eliminarParticipante;
    window.mostrarLogin = mostrarLogin;
    window.mostrarRegistro = mostrarRegistro;
    window.registrar = registrar;
    window.login = login;
    window.cambiarPantalla = cambiarPantalla;
    window.pantallaCrearEvento = function () {
      pantallaCrearEvento();
    };
    window.crearEvento = crearEvento;
    window.verEvento = verEvento;
    window.volverInicio = volverInicio;
    window.eliminarEvento = eliminarEvento;
    window.cerrarInscripcion = cerrarInscripcion;
    window.renderLista = renderLista;
    window.mostrarDecisionFormato = mostrarDecisionFormato;
    window.decisionClasificatoria_32_47 = decisionClasificatoria_32_47;
    window.decisionOctavos = decisionOctavos;
    window.confirmarFormato = confirmarFormato;
    window.toggleGanador = toggleGanador;
    window.siguienteRonda = siguienteRonda;

    onAuthStateChanged(auth, async (user) => {

      try {

        if (user) {
          activarNotificaciones();

          const docRef = doc(db, "usuarios", user.uid);
          const docSnap = await getDoc(docRef);

          let data = null;

          if (docSnap.exists()) {
            data = docSnap.data();
            usuarioActual = data;
            document.getElementById("usernameDisplay").innerText = data.username;
          }

          cambiarPantalla("inicio");
          menu.style.display = "flex";

          const btnOrg = document.getElementById("btnOrganizadores");

          // 🔥 VALIDACIÓN SEGURA
          if (data && data.rol === "organizador") {
            btnOrg.style.display = "block";
          } else {
            btnOrg.style.display = "none";
          }

        } else {

          contenido.innerHTML = `
            <h2>Bienvenido</h2>

            <button onclick="mostrarLogin()" style="width:100%; padding:12px; margin-bottom:10px;">
              Iniciar Sesión
            </button>

            <button onclick="mostrarRegistro()" style="width:100%; padding:12px;">
              Registrarse
            </button>
          `;

          menu.style.display = "none";
        }

      } catch (error) {
        console.error("Error de sesión:", error);
        contenido.innerHTML = "<p>Error cargando la app</p>";
      }

      // 🔥 ESTO SIEMPRE SE EJECUTA
      loader.style.display = "none";
      header.style.display = "flex";
      contenido.style.display = "block";

    });

    function mostrarLogin() {
      contenido.innerHTML = `
        <h3>Iniciar Sesión</h3>
        <input id="loginEmail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="loginPassword" type="password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <button onclick="login()" style="width:100%; padding:10px;">Entrar</button>
      `;
    }

    function mostrarRegistro() {
      contenido.innerHTML = `
        <h3>Registrarse</h3>
        <input id="registerUsername" placeholder="Nombre de usuario" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="registerEmail" placeholder="Email" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="registerPassword" type="password" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input id="registerPassword2" type="password" placeholder="Repetir contraseña" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <button onclick="registrar()" style="width:100%; padding:10px;">Crear cuenta</button>
        <p id="mensajeRegistro"></p>
      `;
    }

    async function registrar() {
      const username = document.getElementById("registerUsername").value;
      const email = document.getElementById("registerEmail").value;
      const pass = document.getElementById("registerPassword").value;
      const pass2 = document.getElementById("registerPassword2").value;
      const mensaje = document.getElementById("mensajeRegistro");

      mensaje.innerText = "Creando cuenta...";
      mensaje.style.color = "yellow";

      if (pass !== pass2) {
        mensaje.innerText = "Las contraseñas no coinciden";
        mensaje.style.color = "red";
        return;
      }

      try {
        const snapshot = await getDocs(collection(db, "usuarios"));
        let existe = false;

        snapshot.forEach(d => {
          if (d.data().username === username) existe = true;
        });

        if (existe) {
          mensaje.innerText = "Nombre de usuario ya usado";
          mensaje.style.color = "red";
          return;
        }

        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);

        await setDoc(doc(db, "usuarios", userCredential.user.uid), {
          username,
          email,
          rol: "publico"
        });

        await auth.signOut();

        let t = 5;
        mensaje.style.color = "lightgreen";

        const i = setInterval(() => {
          mensaje.innerText = `Cuenta creada con éxito, espere (${t})`;
          t--;
          if (t < 0) {
            clearInterval(i);
            mostrarLogin();
          }
        }, 1000);

      } catch (error) {
        mensaje.innerText = error.code === "auth/email-already-in-use"
          ? "Correo ya usado"
          : error.message;
        mensaje.style.color = "red";
      }
    }

    async function login() {
      const email = document.getElementById("loginEmail").value;
      const pass = document.getElementById("loginPassword").value;

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        setTimeout(() => cambiarPantalla("inicio"), 500);
      } catch (error) {
        alert(error.message);
      }
    }

    function cambiarPantalla(p) {

      if (p === "inicio") {
        cargarEventos();
        return;
      }

      if (p === "eventos") {
        contenido.innerHTML = "Eventos";
        return;
      }

      if (p === "organizadores") {

        let html = "<h2>Panel de Organizador</h2>";

        html += `
    <div style="
  background:#111;
  border:1px solid #222;
  padding:16px;
  border-radius:16px;
  margin-bottom:15px;
  text-align:left;
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
">

  <div style="font-size:16px; font-weight:800; margin-bottom:8px;">
    Crear evento
  </div>

  <div style="font-size:13px; color:#aaa; margin-bottom:12px;">
    Publicá una nueva fecha para tu competencia
  </div>

  <button onclick="pantallaCrearEvento()" style="
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#fff;
    color:#000;
    font-weight:bold;
  ">
    Crear
  </button>

</div>

<div style="
  background:#111;
  border:1px solid #222;
  padding:16px;
  border-radius:16px;
  margin-bottom:15px;
  text-align:left;
  box-shadow:0 6px 20px rgba(0,0,0,0.6);
">

  <div style="font-size:16px; font-weight:800; margin-bottom:8px;">
    Crear planilla
  </div>

  <div style="font-size:13px; color:#aaa; margin-bottom:12px;">
    Administrá participantes y cruces del evento
  </div>

  <button onclick="pantallaPlanillas()" style="
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#fff;
    color:#000;
    font-weight:bold;
  ">
    Abrir
  </button>

</div>
  `;

        cambiarContenidoConAnimacion(html, "adelante");
        return;
      }

      let html = `
        <h2>Eventos</h2>
        <p>Lista de eventos próximamente</p>
      `;

      if (usuarioActual && usuarioActual.rol === "organizador") {
        html += `
          <button onclick="pantallaCrearEvento()" style="width:100%; padding:12px; margin-top:15px;">
            Crear Evento
          </button>
        `;
      }

      cambiarContenidoConAnimacion(html, "adelante");
    }

    function cambiarContenidoConAnimacion(nuevoHTML, direccion = "adelante") {

      // posición inicial (salida)
      contenido.style.transition = "transform 0.25s ease, opacity 0.2s ease";

      if (direccion === "adelante") {
        contenido.style.transform = "translateX(-30px)";
      } else {
        contenido.style.transform = "translateX(30px)";
      }

      contenido.style.opacity = "0";

      setTimeout(() => {

        // cambiar contenido
        contenido.innerHTML = nuevoHTML;

        // posición de entrada (desde el lado opuesto)
        contenido.style.transition = "none";

        if (direccion === "adelante") {
          contenido.style.transform = "translateX(30px)";
        } else {
          contenido.style.transform = "translateX(-30px)";
        }

        contenido.style.opacity = "0";

        // activar animación
        requestAnimationFrame(() => {
          contenido.style.transition = "transform 0.25s ease, opacity 0.2s ease";
          contenido.style.transform = "translateX(0)";
          contenido.style.opacity = "1";
        });

      }, 180);
    }

    async function cargarEventos() {

      const querySnapshot = await getDocs(collection(db, "eventos"));



      eventos = [];

      querySnapshot.forEach(docSnap => {
        eventos.push({
          id: docSnap.id,
          ...docSnap.data()
        });
      });

      eventos.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
      eventos = eventos.filter(e => esEventoActivo(e.fecha));

      let html = "<h2>Eventos</h2>";

      if (eventos.length === 0) {
        html += "<p>No hay eventos todavía</p>";
      }
      eventos.forEach((e, i) => {

        html += `
    <div data-id="${e.id}" class="eventoCard eventoCardAnim" style="
      animation-delay:${i * 0.05}s;
      position:relative;
      overflow:hidden;
      border-radius:16px;
      margin-bottom:14px;
      cursor:pointer;
      background:#0f0f0f;
      box-shadow:0 6px 20px rgba(0,0,0,0.6);
    ">

      <div style="
        position:absolute;
        left:0;
        top:0;
        bottom:0;
        width:6px;
        background:${e.color};
      "></div>

      <div style="padding:12px 14px 12px 12px;">

        <!-- COMPETENCIA (AHORA PROTAGONISTA) -->
        <div style="
          font-size:18px;
          font-weight:900;
          color:${e.color};
          margin-bottom:8px;
          text-align:left;
          letter-spacing:0.5px;
        ">
          ${e.competencia}
        </div>

        <!-- BLOQUE PRINCIPAL -->
        <div style="
          display:flex;
          justify-content:space-between;
          align-items:flex-start;
        ">

          <!-- IZQUIERDA -->
          <div style="text-align:left;">

            <div style="
              font-size:17px;
              font-weight:700;
              margin-bottom:4px;
              color:#fff;
            ">
              ${e.ubicacion}
            </div>

            <div style="
              font-size:14px;
              color:#bbb;
              font-weight:500;
            ">
              ${formatearHora(e.horario)} HS • $${e.inscripcion}
            </div>

          </div>

          <!-- DERECHA (MAS PROTAGONISMO) -->
          <div style="
  position:relative;
  text-align:right;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  justify-content:flex-start;
">

  ${obtenerEstadoEvento(e.fecha)
            ? `<div style="
          position:absolute;
          top:-24px;
          right:0;
          background:${obtenerEstadoEvento(e.fecha) === "HOY" ? "#1eff8a" : "#ffd400"};
          color:#000;
          font-size:10px;
          font-weight:900;
          padding:2px 6px;
          border-radius:6px;
        ">
          ${obtenerEstadoEvento(e.fecha)}
        </div>`
            : ""
          }

  <div style="
    font-size:18px;
    font-weight:800;
    color:#fff;
    line-height:1.1;
  ">
    ${e.modalidad.toUpperCase()}<br>
    <span style="font-size:14px; color:#aaa;">
      ${formatearFecha(e.fecha)}
    </span>
  </div>

</div>

        </div>

      </div>

    </div>
  `;
      });

      contenido.innerHTML = html;
    }

    function pantallaCrearEvento() {

      let html = "";

      html += "<h2>Crear Evento</h2>";
      html += "<label>Ubicación</label>";
      html += "<select id='ubicacion' style='width:100%; padding:10px; margin-bottom:10px;'>";
      html += "<option>Plaza San Miguel</option>";
      html += "<option>Hipodromo</option>";
      html += "<option>Anfiteatro</option>";
      html += "<option>SkatePark</option>";
      html += "<option>Plaza Alberdi</option>";
      html += "<option>Plaza Carbó</option>";
      html += "<option>Plaza Cerrada</option>";
      html += "<option>Plaza San Agustín</option>";
      html += "<option>Plaza Sáenz Peña</option>";
      html += "<option>Plaza 1ro de Mayo</option>";
      html += "<option>Parque Lineal Sur</option>";
      html += "<option>Gazzano</option>";
      html += "<option>Polideportivo AATRA</option>";
      html += "</select>";

      html += "<label>Horario</label>";
      html += "<select id='horario' style='width:100%; padding:10px; margin-bottom:10px;'>";
      html += "<option>16:00 - 17:00</option>";
      html += "<option>17:00 - 18:00</option>";
      html += "<option>18:00 - 19:00</option>";
      html += "<option>19:00 - 20:00</option>";
      html += "</select>";

      html += "<label>Fecha</label>";
      html += "<input type='date' id='fecha' style='width:100%; padding:10px; margin-bottom:10px;'>";

      html += "<label>Modalidad</label>";
      html += "<select id='modalidad' style='width:100%; padding:10px; margin-bottom:10px;'>";
      html += "<option>1vs1</option>";
      html += "<option>2vs2</option>";
      html += "<option>3vs3</option>";
      html += "<option>4vs4</option>";
      html += "<option>5vs5</option>";

      html += "<label>Inscripción</label>";
      html += "<div style='display:flex; gap:10px; margin-bottom:10px;'>";

      html += "<select id='inscripcion' style='width:65%; padding:10px;'>";
      html += "<option>500</option>";
      html += "<option>1000</option>";
      html += "<option>1500</option>";
      html += "<option>2000</option>";
      html += "<option>2500</option>";
      html += "</select>";

      html += "<select id='tipo' style='width:35%; padding:10px;'>";
      html += "<option>MC</option>";
      html += "<option>Equipo</option>";

      html += "</div>";

      html += "<button onclick='crearEvento()' style='width:100%; padding:12px; margin-top:10px;'>Crear</button>";
      html += "<button onclick=\"volverInicio()\" style='width:100%; padding:10px; margin-top:10px; background:#222;'>Volver</button>";

      cambiarContenidoConAnimacion(html, "adelante");
    }

    function verEvento(e) {

      let html = "";

      html += `
  <div style="
    position:relative;
    padding:20px;
    border-radius:18px;
    background:linear-gradient(180deg, #141414, #0a0a0a);
    box-shadow:0 10px 30px rgba(0,0,0,0.7);
    text-align:left;
  ">
  `;

      // 🔥 HEADER
      html += `
    <div style="margin-bottom:18px;">
      <div style="
        font-size:22px;
        font-weight:900;
        color:${e.color};
        letter-spacing:0.5px;
        margin-bottom:6px;
      ">
        ${e.competencia}
      </div>

      <div style="
        font-size:16px;
        font-weight:600;
        color:#fff;
        margin-bottom:4px;
      ">
        ${e.ubicacion}
      </div>

      ${obtenerEstadoEvento(e.fecha) ? `
        <div style="
          display:inline-block;
          margin-top:4px;
          padding:3px 8px;
          font-size:11px;
          font-weight:800;
          border-radius:6px;
          background:${obtenerEstadoEvento(e.fecha) === "HOY" ? "#1eff8a" : "#ffd400"};
          color:#000;
        ">
          ${obtenerEstadoEvento(e.fecha)}
        </div>
      ` : ""}
    </div>
  `;

      // 🔥 INFO PRINCIPAL
      html += `
    <div style="
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:18px;
    ">

      <div style="background:#111; padding:10px; border-radius:10px;">
        <div style="font-size:11px; color:#777;">Fecha</div>
        <div style="font-size:15px; font-weight:700;">
          ${formatearFecha(e.fecha)}
        </div>
      </div>

      <div style="background:#111; padding:10px; border-radius:10px;">
        <div style="font-size:11px; color:#777;">Horario</div>
        <div style="font-size:15px; font-weight:700;">
          ${formatearHora(e.horario)} HS
        </div>
      </div>

      <div style="background:#111; padding:10px; border-radius:10px;">
        <div style="font-size:11px; color:#777;">Modalidad</div>
        <div style="font-size:15px; font-weight:700;">
          ${e.modalidad.toUpperCase()}
        </div>
      </div>

      <div style="background:#111; padding:10px; border-radius:10px;">
        <div style="font-size:11px; color:#777;">Inscripción</div>
        <div style="font-size:15px; font-weight:900;">
          $${e.inscripcion}
        </div>
      </div>

    </div>
  `;

      // 🔥 COLECTIVOS (placeholder editable)
      html += `
    <div style="margin-bottom:18px;">
      <div style="
        font-size:13px;
        color:#888;
        margin-bottom:6px;
      ">
        Líneas cercanas
      </div>

      <div style="
        font-size:14px;
        font-weight:600;
        color:#fff;
      ">
        ${e.colectivos || "A definir"}
      </div>
    </div>
  `;

      // 🔥 ORGANIZADOR
      html += `
    <div style="
      margin-bottom:20px;
      font-size:13px;
      color:#aaa;
    ">
      Organiza: <span style="color:#fff; font-weight:600;">
        ${e.creadorNombre || "Desconocido"}
      </span>
    </div>
  `;

      // 🔥 BOTÓN BORRAR
      if (usuarioActual && auth.currentUser.uid === e.creadorId) {
        html += `
      <button onclick="eliminarEvento(event, '${e.id}')" style="
        position:absolute;
        top:12px;
        right:12px;
        background:rgba(255,59,59,0.12);
        border:1px solid rgba(255,59,59,0.4);
        border-radius:10px;
        padding:8px 10px;
        color:#ff3b3b;
        font-size:13px;
        cursor:pointer;
      ">
        Eliminar
      </button>
    `;
      }

      // 🔥 VOLVER
      html += `
    <button onclick="volverInicio()" style="
      width:100%;
      padding:12px;
      background:#fff;
      color:#000;
      border:none;
      border-radius:12px;
      font-weight:800;
      margin-top:10px;
    ">
      Volver
    </button>
  `;

      html += `</div>`;

    function formatearFecha(fecha) {

      if (!fecha) return "";

      const meses = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];

      const [year, month, day] = fecha.split("-");

      return parseInt(day) + " " + meses[parseInt(month) - 1];
    }

    function formatearHora(rango) {
      return rango.split(" - ")[0];
    }

    function obtenerEstadoEvento(fecha) {

      if (!fecha) return null;

      const [y, m, d] = fecha.split("-");

      const hoy = new Date();
      const evento = new Date(y, m - 1, d); // 🔥 LOCAL (NO UTC)

      hoy.setHours(0, 0, 0, 0);
      evento.setHours(0, 0, 0, 0);

      const diff = (evento - hoy) / (1000 * 60 * 60 * 24);

      if (diff === 0) return "HOY";
      if (diff === 1) return "MAÑANA";

      return null;
    }

    function esEventoActivo(fecha) {

      if (!fecha) return false;

      const [y, m, d] = fecha.split("-");

      const hoy = new Date();
      const evento = new Date(y, m - 1, d); // 🔥 LOCAL

      hoy.setHours(0, 0, 0, 0);
      evento.setHours(0, 0, 0, 0);

      return evento >= hoy;
    }

    function calcularDistribucion(total, batallas) {

      let base = Math.floor(total / batallas);
      let extra = total % batallas;

      let arr = [];

      for (let i = 0; i < batallas; i++) {
        arr.push(i < extra ? base + 1 : base);
      }

      return `Distribución: ${arr.join(" - ")} (${batallas} batallas)`;
    }

      ganadoresPorBatalla = pasan;

      // 🔥 detectar si es clasificatoria
      esClasificatoria = pasan > 1;

      iniciarRonda(grupos);

      html += `

    function toggleGanador(batallaIndex, participanteIndex) {

      if (!ganadoresSeleccionados[batallaIndex]) {
        ganadoresSeleccionados[batallaIndex] = [];
      }

      let lista = ganadoresSeleccionados[batallaIndex];

      // ya seleccionado → sacar
      if (lista.includes(participanteIndex)) {
        ganadoresSeleccionados[batallaIndex] =
          lista.filter(i => i !== participanteIndex);
      } else {

        // límite de ganadores por batalla
        if (lista.length >= ganadoresPorBatalla) {
          mostrarNotificacion(`Solo podés elegir ${ganadoresPorBatalla}`);
          return;
        }

        lista.push(participanteIndex);
      }

      renderRonda();
      guardarEstadoPlanilla();
    }

    function siguienteRonda() {

      // 🔥 validar selección
      for (let i = 0; i < rondaActual.length; i++) {

        if (!ganadoresSeleccionados[i] ||
          ganadoresSeleccionados[i].length !== ganadoresPorBatalla) {

          mostrarNotificacion("Faltan seleccionar ganadores");
          return;
        }
      }

      // 🔥 juntar ganadores
      let nuevos = [];

      rondaActual.forEach((batalla, i) => {
        ganadoresSeleccionados[i].forEach(index => {
          nuevos.push(batalla[index]);
        });
      });

      // 🔥 SI ERA CLASIFICATORIA → PASA A ELIMINACIÓN
      if (esClasificatoria) {

        esClasificatoria = false;
        ganadoresPorBatalla = 1; // 🔥 CLAVE

        const batallas = distribuirParticipantes(nuevos, 8); // octavos

        iniciarRonda(batallas);
        guardarEstadoPlanilla();
        return;
      }

      // 🔥 FINAL
      if (nuevos.length === 1) {
        mostrarGanadorFinal(nuevos[0]);
        return;
      }

      // 🔥 SIGUIENTE RONDA NORMAL
      const cantidadBatallas = Math.ceil(nuevos.length / 2);

      const nuevasBatallas = distribuirParticipantes(nuevos, cantidadBatallas);

      iniciarRonda(nuevasBatallas);
      guardarEstadoPlanilla();
    }

    function distribuirParticipantes(participantes, batallas) {

      let cabezas = participantes.filter(p => p.tipo === "cabeza");
      let normales = participantes.filter(p => p.tipo !== "cabeza");

      let grupos = Array.from({ length: batallas }, () => []);

      // 🔥 cabezas primero
      let i = 0;
      cabezas.forEach(c => {
        grupos[i % batallas].push(c);
        i++;
      });

      // 🔥 mezclar normales
      normales = normales.sort(() => Math.random() - 0.5);

      normales.forEach(n => {
        let menor = grupos.reduce((min, g) =>
          g.length < min.length ? g : min
          , grupos[0]);

        menor.push(n);
      });

      return grupos;
    }

      html += `

      padding:12px;
      background:#222;
      color:#fff;
      border:none;
      border-radius:10px;
      margin-top:10px;
    ">
      Volver
    </button>
  `;

      cambiarContenidoConAnimacion(html, "adelante");
    }

    async function pantallaPlanillas() {

      const querySnapshot = await getDocs(collection(db, "eventos"));

      let misEventos = [];

      querySnapshot.forEach(docSnap => {

        const e = {
          id: docSnap.id,
          ...docSnap.data()
        };

        if (
          e.creadorId === auth.currentUser.uid &&
          esEventoActivo(e.fecha)
        ) {
          misEventos.push(e);
        }

      });

      let html = "<h2>Seleccionar evento</h2>";

      if (misEventos.length === 0) {
        html += "<p>No tenés eventos próximos</p>";
      }

      misEventos.forEach(e => {

        html += `
      <div onclick='seleccionarEventoPlanilla(${JSON.stringify(e)})' style="
        background:#111;
        border:1px solid #222;
        padding:14px;
        border-radius:12px;
        margin-bottom:10px;
        text-align:left;
        cursor:pointer;
      ">

        <div style="font-weight:800; margin-bottom:4px;">
          ${e.competencia}
        </div>

        <div style="font-size:13px; color:#aaa;">
          ${e.ubicacion} • ${formatearFecha(e.fecha)}
        </div>

      </div>
    `;
      });


      html += `
    <button onclick="cambiarPantalla('organizadores')" style="
      width:100%;
      padding:12px;
      background:#222;
      color:#fff;
      border:none;
      border-radius:10px;
      margin-top:10px;
    ">
      Volver
    </button>
  `;

      cambiarContenidoConAnimacion(html, "adelante");
    }

    function seleccionarEventoPlanilla(evento) {

      if (!evento) {
        mostrarNotificacion("Evento no encontrado");
        return;
      }

      const estado = obtenerEstadoEvento(evento.fecha);

      if (estado !== "HOY") {

        mostrarConfirmacion(
          "Hoy no es el día del evento. ¿Seguro que querés entrar?",
          () => abrirPlanilla(evento)
        );

        return;
      }

      abrirPlanilla(evento);
    }

    async function abrirPlanilla(evento) {

      eventoPlanillaActual = evento;

      const existe = await cargarEstadoPlanilla(evento.id);

      if (existe) return;

      // 🔥 SI NO EXISTE, ARRANCA NORMAL
      let html = `
    <h2>Planilla</h2>

    <div style="
      background:#111;
      border:1px solid #222;
      padding:16px;
      border-radius:16px;
      margin-bottom:15px;
      text-align:left;
    ">

      <div style="font-size:16px; font-weight:800; margin-bottom:6px;">
        ${evento.competencia}
      </div>

      <div style="font-size:13px; color:#aaa;">
        ${evento.ubicacion} • ${formatearFecha(evento.fecha)}
      </div>

    </div>

    <div style="margin-bottom:15px;">
      ¿Tu evento tiene cabezas de serie?
    </div>

    <button onclick="planillaConCabezas(true)" style="width:100%; margin-bottom:10px;">Sí</button>
    <button onclick="planillaConCabezas(false)" style="width:100%;">No</button>
  `;

      cambiarContenidoConAnimacion(html, "adelante");
    }

    function planillaConCabezas(tieneCabezas) {

      tieneCabezasGlobal = tieneCabezas;
      listaParticipantes = [];

      let html = `<h2>Planilla</h2>`;

      // 🔥 BLOQUE CABEZAS
      if (tieneCabezas) {

        html += `
      <div style="text-align:left; margin-bottom:15px;">

        <div style="font-size:13px; color:#aaa; margin-bottom:6px;">
          Cabezas de serie
        </div>

        <input id="inputCabeza" placeholder="Nombre" style="
          width:100%;
          padding:10px;
          margin-bottom:8px;
          box-sizing:border-box;
        ">

        <button onclick="agregarParticipante('cabeza')" style="
          width:100%;
          padding:10px;
          margin-bottom:10px;
        ">
          Agregar
        </button>

      </div>
    `;
      }

      // 🔥 BLOQUE COMPETIDORES
      html += `
    <div style="text-align:left; margin-bottom:15px;">

      <div style="font-size:13px; color:#aaa; margin-bottom:6px;">
        Competidores
      </div>

      <input id="inputCompetidor" placeholder="Nombre" style="
        width:100%;
        padding:10px;
        margin-bottom:8px;
        box-sizing:border-box;
      ">

      <button onclick="agregarParticipante('normal')" style="
        width:100%;
        padding:10px;
      ">
        Agregar
      </button>

    </div>
  `;

      html += `
  <div id="infoPlanilla" style="
    background:#111;
    border:1px solid #222;
    padding:12px;
    border-radius:12px;
    margin-top:10px;
    text-align:left;
    font-size:13px;
    line-height:1.5;
  "></div>
`;

      // 🔥 LISTA
      html += `
  <div id="listaParticipantes" style="
    margin-top:20px;
    text-align:left;
    max-height:220px;
    overflow-y:auto;
    padding-right:6px;
  "></div>
`;

      // 🔥 VOLVER
      html += `
    <button onclick="cerrarInscripcion()" style="
      width:100%;
      padding:14px;
      background:#1eff8a;
      color:#000;
      border:none;
      border-radius:12px;
      font-weight:900;
      margin-top:15px;
    ">
      Planilla Completa
    </button>

    <button onclick="pantallaPlanillas()" style="
      width:100%;
      padding:12px;
      background:#222;
      color:#fff;
      border:none;
      border-radius:10px;
      margin-top:10px;
    ">
      Volver
    </button>
  `;

      cambiarContenidoConAnimacion(html, "adelante");
    }

    function agregarParticipante(tipo) {

      let input;

      if (tipo === "cabeza") {
        input = document.getElementById("inputCabeza");
      } else {
        input = document.getElementById("inputCompetidor");
      }

      const nombre = input.value.trim();

      if (!nombre) return;

      listaParticipantes.push({
        nombre,
        tipo
      });

      input.value = "";

      renderLista();
      guardarEstadoPlanilla();
    }

    function renderLista() {

      const contenedor = document.getElementById("listaParticipantes");
      const info = document.getElementById("infoPlanilla");

      if (!contenedor) return;

      let html = "";

      let cabezas = listaParticipantes.filter(p => p.tipo === "cabeza").length;
      let normales = listaParticipantes.filter(p => p.tipo !== "cabeza").length;
      let total = listaParticipantes.length;

      // 🔥 DETECTAR FASE
      let fase = "";
      let batallas = 0;

      if (total >= 8 && total <= 15) {
        fase = "Cuartos";
        batallas = 4;
      } else if (total >= 16 && total <= 31) {
        fase = "Octavos";
        batallas = 8;
      } else if (total >= 32) {
        fase = "Clasificatorias";
        batallas = 8;
      } else {
        fase = "Insuficientes";
      }

      // 🔥 DISTRIBUCIÓN PREVIA
      let distribucion = "";

      if (fase === "Octavos") {
        let base = Math.floor(total / 8);
        let extra = total % 8;

        let arr = [];

        for (let i = 0; i < 8; i++) {
          arr.push(i < extra ? base + 1 : base);
        }

        distribucion = arr.join(" - ");
      }

      // 🔥 INFO PANEL
      if (info) {
        info.innerHTML = `
      <div><b>Total:</b> ${total}</div>
      <div><b>Cabezas:</b> ${cabezas}</div>
      <div><b>Competidores:</b> ${normales}</div>
      <div><b>Fase:</b> ${fase}</div>
      <div><b>Batallas:</b> ${batallas}</div>
      ${distribucion ? `<div><b>Distribución:</b> ${distribucion}</div>` : ""}
    `;
      }

      // 🔥 LISTA
      listaParticipantes.forEach((p, i) => {

        html += `
      <div style="
        display:flex;
        justify-content:space-between;
        align-items:center;
        background:#111;
        border:1px solid #222;
        padding:10px;
        border-radius:10px;
        margin-bottom:8px;
      ">

        <div>
          <div style="font-weight:700;">
            ${p.nombre}
          </div>

          <div style="font-size:11px; color:#777;">
            ${p.tipo === "cabeza" ? "Cabeza de serie" : "Competidor"}
          </div>
        </div>

        <button onclick="eliminarParticipante(${i})" style="
          background:#222;
          color:#fff;
          border:none;
          padding:6px 10px;
          border-radius:8px;
        ">
          X
        </button>

      </div>
    `;
      });

      contenedor.innerHTML = html;
    }

    function eliminarParticipante(index) {

      listaParticipantes.splice(index, 1);

      renderLista();
      guardarEstadoPlanilla();
    }

    function generarLlaves(participantes) {

      const total = participantes.length;

      // 🔥 detectar si hay clasificatorias
      const hayClasificatoria = total >= 32;

      // 🔥 cantidad de batallas
      let cantidadBatallas = 8;

      if (total >= 8 && total <= 15) cantidadBatallas = 4;
      else if (total >= 16 && total <= 31) cantidadBatallas = 8;
      else if (total >= 32) cantidadBatallas = 8; // base (después se ajusta según lógica)

      // 🔥 separar cabezas y normales
      let cabezas = participantes.filter(p => p.tipo === "cabeza");
      let normales = participantes.filter(p => p.tipo !== "cabeza");

      // 🔥 crear batallas vacías
      let batallas = Array.from({ length: cantidadBatallas }, () => []);

      // 🔥 PASO 1 — distribuir cabezas
      let i = 0;
      cabezas.forEach(c => {
        batallas[i % cantidadBatallas].push(c);
        i++;
      });

      // 🔥 PASO 2 — mezclar normales
      normales = normales.sort(() => Math.random() - 0.5);

      normales.forEach(n => {
        // meter en la batalla con menos gente
        let menor = batallas.reduce((min, b) =>
          b.length < min.length ? b : min
          , batallas[0]);

        menor.push(n);
      });

      // 🔥 PASO 3 — ajustar distribución SOLO si es OCTAVOS SIN clasificatoria
      if (!hayClasificatoria && cantidadBatallas === 8) {

        let base = Math.floor(total / 8);
        let sobrantes = total % 8;

        let nuevaDistribucion = [];

        for (let i = 0; i < 8; i++) {
          if (i < sobrantes) {
            nuevaDistribucion.push(base + 1);
          } else {
            nuevaDistribucion.push(base);
          }
        }

        // 🔥 rearmar batallas con esa distribución
        let todos = [...cabezas, ...normales];

        let index = 0;
        batallas = nuevaDistribucion.map(size => {
          let grupo = todos.slice(index, index + size);
          index += size;
          return grupo;
        });
      }

      return batallas;
    }


  </script>
